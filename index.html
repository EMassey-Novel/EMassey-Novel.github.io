<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forest is Woven</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --paper: #fbf8f3;
      --ink: #1f1b17;
      --muted: #6e675f;
      --line: #d8d0c6;
      --accent: #245c5a;
      --shadow: rgba(28, 22, 17, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(to bottom, #f7f3ed, var(--bg));
      color: var(--ink);
      line-height: 1.65;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 48px 24px 72px;
      display: grid;
      grid-template-columns: minmax(240px, 360px) minmax(0, 1fr);
      gap: 56px;
      align-items: start;
    }

    .cover-wrap {
      position: sticky;
      top: 40px;
    }

    .cover {
      display: block;
      width: 100%;
      max-width: 360px;
      height: auto;
      border-radius: 6px;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.08),
        0 18px 40px var(--shadow);
      border: 1px solid rgba(60, 48, 38, 0.08);
      background: #e9e1d7;
    }

    .content {
      padding-top: 8px;
    }

    .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(2.6rem, 5vw, 4.6rem);
      line-height: 0.98;
      font-weight: normal;
      letter-spacing: -0.02em;
      margin: 0 0 22px;
      max-width: 10ch;
    }

    .tagline {
      font-size: 1.2rem;
      color: #322b25;
      max-width: 32rem;
      margin: 0 0 28px;
    }

    .rule {
      width: 72px;
      height: 1px;
      background: var(--line);
      margin: 28px 0 30px;
    }

    p {
      font-size: 1.05rem;
      max-width: 42rem;
